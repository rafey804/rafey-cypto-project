name: News Monitor and Multi-TF Signals

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions UI

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel News Monitor Endpoint
        run: |
          curl -X POST https://rafey-cypto-project.vercel.app/api/news-monitor \
               -H "Content-Type: application/json" \
               --max-time 30
